<!DOCTYPE html><html lang="en" class="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
  :root{
    --primary:#0C5283; --dark:#08385A; --ok:#1F7A6B; --amber:#C46A1B; --err:#C0392B;
    --line:#E2EAF1; --grey:#5C6B7A; --faint:#9AAAB8; --card:#fff; --bg:#F4F7FA;
    --radius:12px; --shadow:0 1px 3px rgba(8,56,90,.08),0 1px 2px rgba(8,56,90,.04);
  }

  /* ================= DARK MODE ================= */
  /* Toggled by adding .dark to <html>. Overrides tokens, then repoints the
     surfaces that hard-code light colors. --dark becomes light TEXT here;
     the header background is pinned separately so it stays navy. */
  .dark{
    --primary:#4C9FE0; --dark:#E8EEF5; --ok:#3BA491; --amber:#D98A3C; --err:#E0655A;
    --line:#2B3947; --grey:#A6B4C2; --faint:#7A8A9C; --card:#18232F; --bg:#0E1621;
    --shadow:0 1px 3px rgba(0,0,0,.45),0 1px 2px rgba(0,0,0,.35);
    color-scheme:dark;
  }
  .dark body{background:var(--bg);color:var(--dark)}
  .dark header{background:#0B1B2A}
  .dark .topnav{background:var(--card);border-bottom-color:var(--line)}
  .dark .doc-section,.dark .stat,.dark .m-row,.dark .passport,.dark .sheet,
  .dark .scan-box,.dark .toast,.dark .setup-warn,.dark .dash-health,.dark .due-scroll{background:var(--card)}
  .dark .stat,.dark .due-scroll,.dark .m-row,.dark .qr-pick{border-color:var(--line)}
  .dark .search-bar input,.dark .due-search input,.dark .due-sel,
  .dark .ibtn,.dark .check-item .box{background:var(--card);color:var(--dark);border-color:var(--line)}
  .dark #view-dashboard table.doc thead th,.dark .due-scroll table.doc thead th{background:var(--card)}
  .dark table.doc td,.dark table.doc.dense tbody td{border-bottom-color:var(--line)}
  .dark #view-dashboard table.doc tbody tr:hover{background:rgba(255,255,255,.05)}
  .dark .ibtn:hover{background:rgba(255,255,255,.08);border-color:var(--primary);color:var(--primary)}
  .dark .qr-pick:hover{background:rgba(255,255,255,.05)}
  .dark .stat .ic{background:rgba(255,255,255,.06)}
  .dark .stat.tone-err .ic{background:rgba(224,101,90,.16)}
  .dark .stat.tone-warn .ic{background:rgba(217,138,60,.16)}
  .dark .stat.tone-ok .ic{background:rgba(59,164,145,.16)}
  .dark .stat.alert.tone-err{background:rgba(224,101,90,.12);border-color:rgba(224,101,90,.42)}
  .dark .stat.alert.tone-warn{background:rgba(217,138,60,.12);border-color:rgba(217,138,60,.42)}
  .dark .stat.active.tone-err{background:rgba(224,101,90,.18);border-color:rgba(224,101,90,.6)}
  .dark .stat.active.tone-warn{background:rgba(217,138,60,.18);border-color:rgba(217,138,60,.6)}
  .dark .stat.active{box-shadow:0 0 0 2px var(--primary),0 6px 16px rgba(0,0,0,.4)}
  .dark .pill-over{background:rgba(224,101,90,.18);color:#F1948B}
  .dark .pill-soon{background:rgba(217,138,60,.18);color:#E7B072}
  .dark .dash-health.err{background:rgba(224,101,90,.14);border-color:rgba(224,101,90,.4);color:#F1948B}
  .dark .dash-health.warn{background:rgba(217,138,60,.14);border-color:rgba(217,138,60,.4);color:#E7B072}
  .dark .bar-track{background:rgba(255,255,255,.08)}
  .dark .ibtn-ok{background:var(--card);border-color:rgba(59,164,145,.5);color:var(--ok)}
  .dark .ibtn-ok:hover{background:var(--ok);color:#0E1621}
  .dark .check-item.on,.dark .check-chip{background:rgba(76,159,224,.16)}
  .dark .doc-badge{background:rgba(255,255,255,.06);border-color:var(--line)}
  .dark .qr-wrap .qrbox{background:#fff}   /* keep QR white so scanners read it */
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:#13212E;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.45}
  h1,h2,h3{margin:0;color:var(--dark)}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:15px}
  .hidden{display:none !important}

  header{background:var(--dark);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:30}
  .head-row{display:flex;align-items:center;gap:12px;max-width:1000px;margin:0 auto}
  .brand{font-weight:800;font-size:16px;line-height:1.1}
  .brand small{display:block;font-weight:400;font-size:11px;opacity:.85}
  .spacer{flex:1}
  .whoami{font-size:12px;opacity:.9;cursor:pointer;text-decoration:underline}
  .lang-btn{margin-left:12px;background:rgba(255,255,255,.16);color:#fff;border:none;border-radius:14px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer}
  .lang-btn:hover{background:rgba(255,255,255,.28)}
  .scan-btn{margin-left:8px;background:#1F7A6B;color:#fff;border:none;border-radius:14px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .scan-btn:hover{background:#186354}
  .scan-ic{font-size:14px;line-height:1}
  .btn-scan{background:#1F7A6B;color:#fff;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
  .btn-scan:hover{background:#186354}
  .scan-overlay{position:fixed;inset:0;background:rgba(6,29,73,.92);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
  .scan-overlay.open{display:flex}
  .scan-box{background:#fff;border-radius:16px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .scan-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--dark);color:#fff}
  .scan-head h3{margin:0;font-size:16px}
  .scan-head .x{background:none;border:none;color:#fff;font-size:26px;cursor:pointer;line-height:1}
  .scan-hint{padding:12px 16px 4px;color:var(--grey);font-size:13px;text-align:center}
  .scan-reader{margin:8px 16px;border-radius:12px;overflow:hidden;background:#000;min-height:240px;position:relative}
  .scan-reader video{width:100%!important;height:auto!important;min-height:240px;object-fit:cover;border-radius:12px;display:block!important;visibility:visible!important;opacity:1!important}
  .scan-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:55%;aspect-ratio:1;border:3px solid rgba(31,122,107,.95);border-radius:14px;box-shadow:0 0 0 2000px rgba(0,0,0,.25);pointer-events:none;z-index:2}
  .scan-frame::before,.scan-frame::after{content:"";position:absolute;width:22px;height:22px;border:4px solid #1F7A6B}
  .scan-frame::before{top:-3px;left:-3px;border-right:none;border-bottom:none;border-radius:8px 0 0 0}
  .scan-frame::after{bottom:-3px;right:-3px;border-left:none;border-top:none;border-radius:0 0 8px 0}
  .scan-torch{position:absolute;top:10px;right:10px;z-index:3;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:20px;width:40px;height:40px;font-size:18px;cursor:pointer}
  .scan-result{padding:4px 16px;text-align:center;font-size:14px;min-height:22px;color:var(--err)}
  .scan-actions{padding:8px 16px 18px;display:flex;justify-content:center}
  .scan-manual{padding:0 16px 18px}
  .scan-or{text-align:center;color:var(--faint);font-size:12px;margin:2px 0 8px}
  .scan-tip{text-align:center;color:var(--grey);font-size:11.5px;padding:6px 16px 0}
  .scan-zoom{display:flex;align-items:center;gap:10px;padding:8px 16px 0}
  .scan-zoom input{flex:1}
  .scan-zoom-ic{font-size:14px}
  .scan-manual-row{display:flex;gap:8px}
  .scan-manual-row input{flex:1;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px}
  .detail-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}
  :lang(km), [lang="km"]{font-family:'Noto Sans Khmer','Khmer OS','Battambang',-apple-system,sans-serif}
  main{max-width:1000px;margin:0 auto;padding:16px}

  .search-bar input{width:100%;padding:14px;border:1px solid var(--line);border-radius:10px;background:#fff}
  .topnav{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:49px;z-index:20}
  .topnav-inner{max-width:1000px;margin:0 auto;display:flex}
  .topnav button{flex:0 0 auto;padding:13px 22px;background:none;border:none;border-bottom:3px solid transparent;color:var(--grey);font-weight:600;font-size:14px;cursor:pointer}
  .topnav button.active{color:var(--primary);border-bottom-color:var(--primary)}
  .list-top{display:flex;gap:10px;align-items:stretch;margin-bottom:4px}
  .list-top .btn{white-space:nowrap}
  /* ---------- Dashboard visual refresh ---------- */
  .dash-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:2px 0 14px;flex-wrap:wrap}
  .dash-eyebrow{font-size:11px;font-weight:800;letter-spacing:.16em;color:var(--faint);text-transform:uppercase}
  .dash-title{font-size:22px;font-weight:800;color:var(--dark);line-height:1.15;margin-top:3px}
  .dash-health{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--ok)}
  .dash-health .dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex:none}
  .dash-health.warn{background:#FBF1E3;border-color:#F0DCC0;color:var(--amber)}
  .dash-health.err{background:#FBECEA;border-color:#F2D6D2;color:var(--err)}

  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:12px;margin-bottom:8px}
  .stat{position:relative;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:15px 15px 13px;overflow:hidden;transition:transform .15s ease,box-shadow .15s ease}
  .stat:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(8,56,90,.10)}
  .stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--primary)}
  .stat.tone-err::before{background:var(--err)} .stat.tone-warn::before{background:var(--amber)} .stat.tone-ok::before{background:var(--ok)}
  .stat .stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .stat .ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:var(--bg);color:var(--primary);flex:none}
  .stat .ic svg{width:17px;height:17px;display:block}
  .stat.tone-err .ic{background:#FBECEA;color:var(--err)} .stat.tone-warn .ic{background:#FBF1E3;color:var(--amber)} .stat.tone-ok .ic{background:#E8F3F0;color:var(--ok)}
  .stat .n{font-size:27px;font-weight:800;color:var(--dark);line-height:1;font-variant-numeric:tabular-nums}
  .stat.alert.tone-err .n{color:var(--err)} .stat.alert.tone-warn .n{color:var(--amber)}
  .stat.alert.tone-err{background:#FDECEA;border-color:#F0C7C0} .stat.alert.tone-warn{background:#FDF4E7;border-color:#EAD8BB}
  .stat .l{font-size:11.5px;color:var(--grey);text-transform:uppercase;letter-spacing:.04em;margin-top:6px;font-weight:600;line-height:1.3}
  /* keep legacy hooks harmless */
  .stat .n.warn{color:var(--amber)} .stat .n.err{color:var(--err)}

  /* status pills (due list) */
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 9px 3px 8px;border-radius:999px;letter-spacing:.02em;white-space:nowrap}
  .pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;flex:none}
  .pill-over{background:#FBECEA;color:var(--err)} .pill-soon{background:#FBF1E3;color:var(--amber)}
  .due-cell{display:inline-flex;align-items:center;gap:9px;flex-wrap:wrap}
  .due-cell .dt{font-variant-numeric:tabular-nums;color:var(--grey)}

  /* breakdown bar charts */
  .bd-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 26px}
  @media(max-width:620px){ .bd-grid{grid-template-columns:1fr} }
  .bd-col-h{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin:0 0 9px;display:flex;align-items:center;gap:7px}
  .bd-col-h::before{content:"";width:7px;height:7px;border-radius:2px;background:var(--primary)}
  .bd-col.mech .bd-col-h::before{background:var(--ok)}
  .bar-row{display:grid;grid-template-columns:100px 1fr 28px;align-items:center;gap:10px;padding:4px 0}
  .bar-row .bl{font-size:13px;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{height:8px;border-radius:6px;background:var(--bg)}
  .bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--primary),#2C77A8);min-width:3px;transition:width .4s ease}
  .bd-col.mech .bar-fill{background:linear-gradient(90deg,var(--ok),#3E9E8C)}
  .bar-row .bv{font-size:13px;font-weight:800;color:var(--dark);font-variant-numeric:tabular-nums;text-align:right}

  /* dashboard section tick + row hover */
  #view-dashboard .doc-section .sec-head h2{display:flex;align-items:center;gap:9px}
  #view-dashboard .doc-section .sec-head h2::before{content:"";width:4px;height:17px;border-radius:3px;background:var(--primary);flex:none}
  #view-dashboard table.doc tbody tr{transition:background .12s}
  #view-dashboard table.doc tbody tr:hover{background:#F6FAFC}

  /* ---- Maintenance-due workbench (filters, dense sortable table, actions) ---- */
  .due-controls{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px}
  .due-search{flex:1 1 200px;min-width:150px}
  .due-search input{width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:9px;font-size:13px;background:#fff}
  .due-search input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(12,82,131,.12)}
  .due-sel{padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-size:13px;background:#fff;color:var(--dark);cursor:pointer}
  .due-sel:focus{outline:none;border-color:var(--primary)}
  .due-spacer{flex:1 1 auto}
  .due-tablewrap{overflow-x:auto}
  table.doc.dense th,table.doc.dense td{padding:7px 10px;font-size:13px}
  table.doc.dense thead th{font-size:11px;letter-spacing:.03em}
  table.doc.dense tbody td{border-bottom:1px solid #EEF2F6}
  table.doc.dense .mlink{font-weight:700;color:var(--primary);text-decoration:none}
  th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
  th.sortable:hover{color:var(--primary)} th.sorted{color:var(--primary)}
  th.act-h,td.act-c{text-align:right;white-space:nowrap}
  .dt.tier-critical{color:var(--err);font-weight:700}
  .dt.tier-late{color:var(--amber);font-weight:700}
  .dt.tier-soon{color:var(--dark)}
  .dl{font-variant-numeric:tabular-nums;font-weight:800;font-size:12.5px}
  .dl-critical{color:var(--err)} .dl-late{color:var(--amber)} .dl-soon{color:var(--grey)} .dl-fut{color:var(--faint);font-weight:600}
  .ibtn{display:inline-grid;place-items:center;width:28px;height:28px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;font-size:14px;color:var(--grey);line-height:1;transition:all .12s;vertical-align:middle}
  .ibtn:hover{border-color:var(--primary);color:var(--primary);background:#F5FAFD}
  .ibtn:disabled{opacity:.4;cursor:default}
  .ibtn-ok{color:var(--ok);border-color:#CDE7E0}
  .ibtn-ok:hover{background:var(--ok);color:#fff;border-color:var(--ok)}
  .due-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;flex-wrap:wrap}
  .due-count{font-size:12.5px;color:var(--grey);font-variant-numeric:tabular-nums}
  .due-pager{display:flex;align-items:center;gap:8px}
  .due-pg{font-size:13px;font-weight:700;color:var(--dark);font-variant-numeric:tabular-nums;min-width:44px;text-align:center}

  /* clickable KPI filter cards */
  .stat.clickable{cursor:pointer}
  .stat.clickable:hover{border-color:var(--primary)}
  .stat.clickable:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
  .stat.active{box-shadow:0 0 0 2px var(--primary),0 6px 16px rgba(8,56,90,.12)}
  .stat.active.tone-err{box-shadow:0 0 0 2px var(--err),0 6px 16px rgba(192,57,43,.16);background:#FDECEA;border-color:#F0C7C0}
  .stat.active.tone-warn{box-shadow:0 0 0 2px var(--amber),0 6px 16px rgba(196,106,27,.16);background:#FDF4E7;border-color:#EAD8BB}

  /* fixed-height internal-scroll container for the due table */
  .due-scroll{max-height:520px;overflow:auto;border:1px solid var(--line);border-radius:12px;background:#fff}
  .due-scroll table.doc.dense{margin:0;width:100%;border-collapse:separate;border-spacing:0}
  #view-dashboard .due-scroll table.doc thead th{top:0;z-index:6;box-shadow:inset 0 -1px 0 var(--line)}
  .due-scrollcount{font-size:12.5px;color:var(--grey);margin-top:10px;font-variant-numeric:tabular-nums}
  .exp-btns{display:flex;gap:6px}
  .mini{font-size:12px;color:var(--grey)}
  .qr-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .qr-selbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .qr-picklist{max-height:280px;overflow:auto;border:1px solid var(--line);border-radius:8px}
  .qr-pick{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid #EEF2F6;cursor:pointer}
  .qr-pick:last-child{border-bottom:none}
  .qr-pick:hover{background:#F7FAFC}
  .qr-pick input{width:17px;height:17px;flex:0 0 auto}
  .qr-pick .c{font-weight:700;color:var(--dark);min-width:78px}
  .qr-pick .m{color:var(--grey);font-size:13px}
  .qr-sheet-area{margin-top:14px}
  .qr-labels{display:grid;grid-template-columns:repeat(2, 3cm);gap:6px;justify-content:center}
  .qr-label{width:3cm;height:2cm;border:1px solid #ccc;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px;box-sizing:border-box;page-break-inside:avoid;break-inside:avoid}
  .qr-label .qim{width:1.35cm;height:1.35cm;display:flex;align-items:center;justify-content:center}
  .qr-label .qim canvas,.qr-label .qim img{width:100%!important;height:100%!important}
  .qr-label .qc{font-size:9pt;font-weight:800;color:#08385A;margin-top:1px;line-height:1}
  @media print {
    header, .topnav, .no-print { display:none !important; }
    body, html { background:#fff; }
    main { padding:0; max-width:none; }
    .qr-sheet-area { margin:0; }
    .qr-labels { gap:4px; }
    .qr-label { border:1px solid #999; }
    @page { margin:8mm; }
  }
  .count-line{color:var(--grey);font-size:13px;margin:10px 2px}
  .m-row{background:#fff;border-radius:10px;box-shadow:var(--shadow);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:box-shadow .12s}
  .m-row:hover{box-shadow:0 0 0 2px rgba(12,82,131,.15)}
  .m-row .code{font-weight:800;color:var(--dark);min-width:84px}
  .m-row .info{flex:1;min-width:0}
  .m-row .info .t{font-weight:600;font-size:14px}
  .m-row .info .m{color:var(--grey);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .m-row .chev{color:var(--faint)}
  .doc-badges{display:flex;gap:5px}
  .doc-badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;background:#EEF3F7;color:var(--primary)}

  .btn{padding:11px 16px;border:none;border-radius:9px;font-weight:700;font-size:14px}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-secondary{background:#fff;color:var(--dark);border:1px solid var(--line)}
  .btn-sm{padding:7px 12px;font-size:13px}
  .btn-danger{background:#fff;color:var(--err);border:1px solid #F0C9C5}
  .actions{display:flex;gap:10px;flex-wrap:wrap}

  /* machine detail */
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--primary);font-weight:600;font-size:14px;cursor:pointer;margin-bottom:12px}
  .passport{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:16px;display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
  .passport .pcode{font-size:24px;font-weight:800;color:var(--dark)}
  .passport .pmeta{color:var(--grey);font-size:13px;margin-top:4px}
  .passport .pphoto{width:132px;height:112px;border-radius:10px;border:1px solid var(--line);overflow:hidden;flex:none;background:var(--bg);position:relative;cursor:pointer}
  .passport .pphoto img{width:100%;height:100%;object-fit:cover;display:block}
  .passport .pphoto .ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--faint);text-align:center;padding:6px}
  .passport .pphoto .ph svg{width:26px;height:26px}
  .passport .pphoto .ph span{font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;line-height:1.3}

  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(80px);background:var(--dark);color:#fff;padding:12px 18px;border-radius:24px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;transition:.25s;z-index:80}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .toast.err{background:var(--err)} .toast.ok{background:var(--ok)}
  .setup-warn{max-width:560px;margin:60px auto;padding:24px;background:#fff;border-radius:12px}
